---
 - name: Terminating the ec2 instances if tags are not there
   hosts: localhost
   gather_facts: false
   tasks:
   - name: getting the ec2_info
     amazon.aws.ec2_instance_info:
      region: us-east-1
     register: ec2_info
   - name: displaying the output 
     debug: var=item.tags
     with_items: "{{ec2_info.instances}}"
     when: item.tags.keys() | length==0
   - name: terminating the ec2_instance which are not having tags
     amazon.aws.ec2_instance:
      instance_ids: "{{ec2_info.instance_ids}}"
      region: us-east-1
      state: terminated
      wait: yes
      with_items: "{{ec2_info.instances}}"
      when: item.tags.keys() | length==0
      

     