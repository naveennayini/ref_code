---
 - name: Terminating the ec2 instances if tags are not there
   hosts: localhost
   gather_facts: false
   tasks:
   - name: terminating the ec2 instance
     amazon.aws.ec2_instance_info:
      region: us-east-1
     register: ec2_info
   - name: displaying the output 
     debug: var=item.tags
     with_items: "{{ec2_info.instances}}"
     when: item.tags.keys() | lenght == 0