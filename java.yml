---
  - name: install and configure the tomcat
    hosts: localhost
    gather_facts: false
    become: yes
    tasks: 
      - name: updating_repos
        yum: 
          name: "*"
          state: latest
      - name: installing required java
        yum: 
          name: java-*
          state: present
      - name: finding the jdk version
        command: java -version
        register: java_version_outputs
      - debug: 
           var: java_version_outputs.stderr.split('\nopenjdk')