---
  - name: install and configure the tomcat
    hosts: localhost
    gather_facts: false
    vars:
      req_java: java-*
      set_java: java-*
      req_tomcat_var: 9.0.26
      tomcat_url: http://mirrors.estointernet.in/apache/tomcat/tomcat-{{req_tomcat_var.split('.')[0]}}/v{{req_tomcat_var}}
    become: yes
    tasks: 
      - name: updating_repos
        yum: 
          name: "*"
          state: latest
      - name: installing required java
        yum: 
          name: "{{req_java}}"
          state: present
      - name: finding the jdk version
        command: java -version
        register: java_version_outputs
      - debug: 
           var: java_version_outputs.stderr.split(" ")[:3]
      - name: Downloading required tomcat
        become: yes
        get_url:
          url: "{{tomcat_url}}"
          dest: /usr/local
