---
  - name: install and configure the tomcat
    hosts: localhost
    gather_facts: false
    vars:
      req_java: java-*
      set_java: java-*
      TOMCAT_VER: 8.5.31
      tomcat_url: http://mirror.vorboss.net/apache/tomcat/tomcat-8/v${TOMCAT_VER}/bin/apache-tomcat-${TOMCAT_VER}.tar.gz
    become: yes
    tasks: 
      - name: updating_repos
        yum: 
          name: "*"
          state: latest
      - name: installing required java
        yum: 
          name: "{{req_java}}"
          state: present
      - name: finding the jdk version
        command: java -version
        register: java_version_outputs
      - debug: 
           var: java_version_outputs.stderr.split(" ")[:3]
      - name: Downloading required tomcat
        get_url:
          url: "{{tomcat_url}}"
          dest: /usr/local
