---
  - name: install and configure the tomcat
    hosts: localhost
    gather_facts: false
    vars:
      req_java: java-*
      set_java: java-*
    become: yes
    tasks: 
      - name: updating_repos
        yum: 
          name: "*"
          state: latest
      - name: installing required java
        yum: 
          name: {{ set_java }}
          state: present
      - name: finding the jdk version
        command: java -version
        register: java_version_outputs
      - debug: 
           var: java_version_outputs.stderr.split(" ")[:3]
