---
 - name: Generating ec2 instances into csv file
   hosts: localhost
   gather_facts: false
   tasks:
   - name: report of csv
     amazon.aws.ec2_instance_info:
      region: us-east-1
      filters:
       "tag:ENV": Test
     register: out
   - name: Using template module & src as jinja2 file
     template:
       src: /home/ec2-user/ansible_test/jinj2_file.j2
       dest: /home/ec2-user/ansible_test/instances_list.csv

     